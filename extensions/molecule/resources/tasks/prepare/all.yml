# Prepare: tasks run once on all hosts before converge.
#
# Sets up prerequisites that are out of scope for the roles under test but
# required by the test environment (e.g. a local database for the server role).

---

- name: "Prepare | Install MariaDB server"
  ansible.builtin.package:
    name: "mariadb-server"
    state: "present"


- name: "Prepare | Start and enable MariaDB"
  ansible.builtin.service:
    name: "mariadb"
    state: "started"
    enabled: true


- name: "Prepare | Create Zabbix database and user"
  ansible.builtin.shell:
    cmd: |
      mysql --user=root <<'EOF'
      CREATE DATABASE IF NOT EXISTS zabbix CHARACTER SET utf8mb4 COLLATE utf8mb4_bin;
      CREATE USER IF NOT EXISTS 'zabbix'@'localhost' IDENTIFIED BY '';
      GRANT ALL PRIVILEGES ON zabbix.* TO 'zabbix'@'localhost';
      FLUSH PRIVILEGES;
      EOF
  changed_when: false
