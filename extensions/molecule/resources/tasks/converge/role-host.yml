- name: "Molecule | Converge | host: interface with invalid type must cause failure"
  a9f.zabbix.host:
    api_url: "https://zabbix.example.com/api_jsonrpc.php"
    api_token: "sometoken"
    name: "test-host"
    host_groups:
      - "Linux servers"
    interfaces:
      - type: "invalid_type"
        useip: true
        ip: "192.0.2.1"
        port: "10050"
    state: present
  ignore_errors: true # noqa: ignore-errors
  register: "__molecule_host_invalid_iface_type_result"


- name: "Molecule | Converge | host: assert that invalid interface type caused failure"
  ansible.builtin.assert:
    that:
      - __molecule_host_invalid_iface_type_result is failed
    fail_msg: "Module did not fail when an interface had an invalid type"
    success_msg: "Module correctly failed when an interface had an invalid type"
