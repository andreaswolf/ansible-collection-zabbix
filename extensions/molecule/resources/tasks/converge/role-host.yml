# Validation-failure tests for the a9f.zabbix.host module.
#
# Each block exercises one input-validation branch. The module is expected to
# fail in all cases; the assert immediately after each task confirms it.
#
# Full happy-path API tests require a live Zabbix server and are not covered
# in this scenario. See extensions/molecule/resources/tasks/verify/host-validation.yml.

- name: "Molecule | Converge | host: missing api_url must cause failure"
  a9f.zabbix.host:
    api_url: ""
    api_token: "sometoken"
    name: "test-host"
    host_groups:
      - "Linux servers"
    state: present
  ignore_errors: true # noqa: ignore-errors
  register: "__molecule_host_missing_url_result"


- name: "Molecule | Converge | host: assert that missing api_url caused failure"
  ansible.builtin.assert:
    that:
      - __molecule_host_missing_url_result is failed
    fail_msg: "Module did not fail when api_url was empty"
    success_msg: "Module correctly failed when api_url was empty"


- name: "Molecule | Converge | host: no auth method configured must cause failure"
  a9f.zabbix.host:
    api_url: "https://zabbix.example.com/api_jsonrpc.php"
    api_token: ""
    api_user: ""
    api_password: ""
    name: "test-host"
    host_groups:
      - "Linux servers"
    state: present
  ignore_errors: true # noqa: ignore-errors
  register: "__molecule_host_no_auth_result"


- name: "Molecule | Converge | host: assert that missing auth caused failure"
  ansible.builtin.assert:
    that:
      - __molecule_host_no_auth_result is failed
    fail_msg: "Module did not fail when no authentication method was configured"
    success_msg: "Module correctly failed when no authentication method was configured"


