# Default variables and values for this role.
#
# These variables are designed to be easily overridden (as they have a low
# precedence) and typically allow users to customize the role's behavior.
# Each variable should have a clear comment above it, describing its purpose
# and how it fits into the role's functionality.

---

# String. Determines whether the managed resources should be "present" or
# "absent". Defaults to "present". Possible values:
#
# - "present": Ensures that required components, such as software packages,
#   are installed and configured.
# - "absent": Reverts changes as much as possible, such as removing packages,
#   deleting created users, stopping services, restoring modified settings, …
agent2_zabbix_state: "present"


# Boolean. If set to true, all managed packages will be upgraded during each
# Ansible run (e.g., when the package provider detects a newer version than
# the currently installed one). Defaults to false.
agent2_zabbix_autoupgrade: false


# String. Defines the status of the service(s). Defaults to "enabled".
# Possible values:
#
# - "enabled": Service is running and will start automatically at boot.
# - "disabled": Service is stopped and will not start automatically at boot.
# - "running": Service is running but will not start automatically at boot.
#   This can be used to start a service on the first Ansible run without
#   enabling it for boot.
# - "unmanaged": Service will not start at boot, and Ansible will not
#   manage its running state. This is primarily useful when services are
#   monitored and managed by systems other than Ansible.
#
# The singular form ("service") is used for simplicity. However, the defined
# status applies to all services if multiple are being managed by this role.
agent2_zabbix_service_state: "enabled"


# String. Zabbix minor version used when constructing repo URLs.
# Examples: "7.2", "7.4". Defaults to "7.4".
agent2_zabbix_version: "7.4"


# String. Address of the Zabbix server (or proxy) for passive checks.
# Defaults to "127.0.0.1".
agent2_zabbix_server: "127.0.0.1"


# String. Address of the Zabbix server (or proxy) for active checks.
# If empty, agent2_zabbix_server is used. Defaults to "".
agent2_zabbix_server_active: ""


# String. Hostname of the agent as registered in Zabbix. If empty,
# HostnameItem=system.hostname is used instead. Defaults to "".
agent2_zabbix_hostname: ""


# Integer. Port the agent listens on for passive checks. Defaults to 10050.
agent2_zabbix_listen_port: 10050


# List of strings. Custom metrics defined via Zabbix UserParameter directives.
# Each entry is a string of the form "<key>,<command>", which gets written to
# the agent configuration as "UserParameter=<key>,<command>". Defaults to [].
# Example:
#   agent2_zabbix_user_parameters:
#     - "custom.uptime,cat /proc/uptime"
#     - "custom.hostname,hostname -f"
agent2_zabbix_user_parameters: []


# String. How the agent connects to the Zabbix server or proxy for active
# checks. Defaults to "unencrypted". Possible values:
#
# - "unencrypted": Plain-text connection (no encryption).
# - "psk": Connection encrypted using a pre-shared key.
# - "cert": Connection encrypted using a TLS certificate.
agent2_zabbix_tls_connect: "unencrypted"


# List of strings. What incoming connection types the agent accepts for passive
# checks. Defaults to ["unencrypted"]. Each item must be one of:
#
# - "unencrypted": Accept plain-text connections.
# - "psk": Accept connections encrypted with a pre-shared key.
# - "cert": Accept connections encrypted with a TLS certificate.
#
# Multiple values are allowed, e.g. ["unencrypted", "psk"].
agent2_zabbix_tls_accept:
  - "unencrypted"


# String. PSK identity string sent to the Zabbix server to identify which
# pre-shared key to use. Maximum 128 UTF-8 characters. The identity is
# transmitted in plain text, so avoid using sensitive information here.
# Required when agent2_zabbix_tls_connect or agent2_zabbix_tls_accept
# includes "psk". Defaults to "".
agent2_zabbix_tls_psk_identity: ""


# String. Pre-shared key value as a hex-encoded string. Minimum 32 hex
# characters (128 bits), maximum 512 hex characters (2048 bits). When
# non-empty, the role writes this value to agent2_zabbix_tls_psk_file on the
# managed host. Leave empty if the PSK file is managed externally. Defaults
# to "".
agent2_zabbix_tls_psk_secret: ""


# String. Absolute path to the PSK file on the managed host. When
# agent2_zabbix_tls_psk_secret is non-empty, this file is created and managed
# by the role (owned by the zabbix user, mode 0400). When
# agent2_zabbix_tls_psk_secret is empty, the path is only referenced in the
# agent configuration and the file must be provisioned externally.
# Defaults to "/etc/zabbix/zabbix_agent2.psk".
agent2_zabbix_tls_psk_file: "/etc/zabbix/zabbix_agent2.psk"
