# Setup: Manage basic resource removal, such as packages or service users.

---

- name: "Setup | Uninstall | Default | Remove packages"
  ansible.builtin.package:
    name: "{{ __server_zabbix_packages_uninstall }}"
    state: "absent"
  when:
    - __server_zabbix_packages_uninstall is defined
    - (__server_zabbix_packages_uninstall | length) > 0
